<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventilator</title>

  <style>
    :root {
      --bg-1: #eaf8ff;
      --bg-2: #c4efff;
      --blue-light: #dff8ff;
      --blue-mid: #8bdcf6;
      --blue-main: #38aee5;
      --blue-dark: #0f79b8;
      --shadow: rgba(15, 121, 184, 0.25);
      --fan-speed: 0.85s;
      --wind-speed: 1.2s;
      --wind-opacity: 0.9;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,255,255,0.95), transparent 32%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,0.55), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .app {
      width: min(620px, 94vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .fan-area {
      position: relative;
      width: min(560px, 92vw);
      height: min(620px, 98vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wind-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: var(--wind-opacity);
    }

    .wind-line {
      position: absolute;
      left: 55%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        rgba(56, 174, 229, 0.58),
        rgba(56, 174, 229, 0.25),
        rgba(56, 174, 229, 0)
      );
      filter: blur(0.15px);
      animation: windLineMove var(--wind-speed) linear infinite;
      opacity: 0;
    }

    .wind-line:nth-child(1) {
      top: 19%;
      width: 130px;
      animation-delay: -0.1s;
    }

    .wind-line:nth-child(2) {
      top: 27%;
      width: 215px;
      animation-delay: -0.35s;
    }

    .wind-line:nth-child(3) {
      top: 36%;
      width: 170px;
      animation-delay: -0.62s;
    }

    .wind-line:nth-child(4) {
      top: 46%;
      width: 245px;
      animation-delay: -0.86s;
    }

    .wind-line:nth-child(5) {
      top: 56%;
      width: 190px;
      animation-delay: -1.05s;
    }

    .wind-line:nth-child(6) {
      top: 66%;
      width: 230px;
      animation-delay: -1.28s;
    }

    .wind-line:nth-child(7) {
      top: 76%;
      width: 145px;
      animation-delay: -1.52s;
    }

    .wind-dot {
      position: absolute;
      left: 57%;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(56, 174, 229, 0.34);
      animation: windDotMove calc(var(--wind-speed) * 1.15) linear infinite;
      opacity: 0;
    }

    .wind-dot:nth-child(8) {
      top: 31%;
      animation-delay: -0.2s;
    }

    .wind-dot:nth-child(9) {
      top: 49%;
      animation-delay: -0.75s;
    }

    .wind-dot:nth-child(10) {
      top: 62%;
      animation-delay: -1.15s;
    }

    .wind-dot:nth-child(11) {
      top: 72%;
      animation-delay: -1.55s;
    }

    @keyframes windLineMove {
      0% {
        transform: translateX(-25px) scaleX(0.35);
        opacity: 0;
      }

      16% {
        opacity: 0.9;
      }

      72% {
        opacity: 0.55;
      }

      100% {
        transform: translateX(190px) scaleX(1.25);
        opacity: 0;
      }
    }

    @keyframes windDotMove {
      0% {
        transform: translateX(-20px) translateY(0) scale(0.7);
        opacity: 0;
      }

      20% {
        opacity: 0.65;
      }

      100% {
        transform: translateX(210px) translateY(-18px) scale(1.3);
        opacity: 0;
      }
    }

    .fan-wrapper {
      position: absolute;
      top: 20px;
      left: 50%;
      width: min(470px, 86vw);
      height: min(470px, 86vw);
      transform: translateX(-50%);
      z-index: 3;
      filter: drop-shadow(0 32px 40px var(--shadow));
    }

    .fan-svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .fan-rotor {
      transform-origin: 250px 250px;
      transform-box: view-box;
      animation: spin var(--fan-speed) linear infinite;
      will-change: transform;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .center-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 116px;
      height: 116px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 25%, #ffffff, #e5f9ff 44%, #8ddaf7 100%);
      border: 8px solid rgba(255,255,255,0.92);
      box-shadow:
        inset 0 -10px 24px rgba(15, 121, 184, 0.18),
        0 14px 30px rgba(15, 121, 184, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .center-logo img {
      width: 70%;
      height: 70%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .stand {
      position: absolute;
      top: 445px;
      left: 50%;
      width: 78px;
      height: 140px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, #69c8ec, #e5f9ff 50%, #54bce7);
      box-shadow:
        inset 0 0 20px rgba(15, 121, 184, 0.22),
        0 18px 28px rgba(15, 121, 184, 0.12);
      z-index: 2;
    }

    .base {
      position: absolute;
      top: 555px;
      left: 50%;
      width: 270px;
      height: 66px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, #e2f8ff, #70cbed);
      box-shadow:
        inset 0 -13px 24px rgba(15, 121, 184, 0.18),
        0 22px 34px rgba(15, 121, 184, 0.18);
      z-index: 2;
    }

    .controls {
      width: min(360px, 82vw);
      padding: 18px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(255,255,255,0.85);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 45px rgba(15, 121, 184, 0.16);
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
      accent-color: var(--blue-dark);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 620px) {
      .fan-area {
        height: 560px;
      }

      .stand {
        top: 405px;
        height: 125px;
      }

      .base {
        top: 505px;
        width: 230px;
      }

      .center-logo {
        width: 96px;
        height: 96px;
      }

      .wind-line {
        max-width: 150px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .fan-rotor,
      .wind-line,
      .wind-dot {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="fan-area" aria-label="Ventilator">
      <div class="wind-layer" aria-hidden="true">
        <span class="wind-line"></span>
        <span class="wind-line"></span>
        <span class="wind-line"></span>
        <span class="wind-line"></span>
        <span class="wind-line"></span>
        <span class="wind-line"></span>
        <span class="wind-line"></span>

        <span class="wind-dot"></span>
        <span class="wind-dot"></span>
        <span class="wind-dot"></span>
        <span class="wind-dot"></span>
      </div>

      <div class="fan-wrapper">
        <svg class="fan-svg" viewBox="0 0 500 500" role="img" aria-label="Moderne lichtblauwe ventilator">
          <defs>
            <radialGradient id="fanBodyGradient" cx="36%" cy="28%" r="70%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="48%" stop-color="#ddf7ff" />
              <stop offset="100%" stop-color="#8edbf7" />
            </radialGradient>

            <linearGradient id="bladeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f3fcff" />
              <stop offset="42%" stop-color="#b9ecff" />
              <stop offset="100%" stop-color="#38aee5" />
            </linearGradient>

            <linearGradient id="grillGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
              <stop offset="100%" stop-color="#0f79b8" stop-opacity="0.26" />
            </linearGradient>

            <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#0f79b8" flood-opacity="0.23" />
            </filter>
          </defs>

          <circle
            cx="250"
            cy="250"
            r="226"
            fill="url(#fanBodyGradient)"
            stroke="rgba(255,255,255,0.88)"
            stroke-width="18"
            filter="url(#softShadow)"
          />

          <circle
            cx="250"
            cy="250"
            r="199"
            fill="none"
            stroke="rgba(15,121,184,0.14)"
            stroke-width="5"
          />

          <circle
            cx="250"
            cy="250"
            r="151"
            fill="none"
            stroke="rgba(15,121,184,0.13)"
            stroke-width="4"
          />

          <g class="fan-rotor">
            <path
              d="M250 250 C292 198, 366 174, 397 210 C420 237, 395 276, 344 286 C304 294, 274 280, 250 250 Z"
              fill="url(#bladeGradient)"
              opacity="0.94"
            />

            <path
              d="M250 250 C302 292, 326 366, 290 397 C263 420, 224 395, 214 344 C206 304, 220 274, 250 250 Z"
              fill="url(#bladeGradient)"
              opacity="0.94"
            />

            <path
              d="M250 250 C208 302, 134 326, 103 290 C80 263, 105 224, 156 214 C196 206, 226 220, 250 250 Z"
              fill="url(#bladeGradient)"
              opacity="0.94"
            />

            <path
              d="M250 250 C198 208, 174 134, 210 103 C237 80, 276 105, 286 156 C294 196, 280 226, 250 250 Z"
              fill="url(#bladeGradient)"
              opacity="0.94"
            />

            <circle
              cx="250"
              cy="250"
              r="42"
              fill="rgba(255,255,255,0.35)"
            />
          </g>

          <g opacity="0.68">
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(15 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(30 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(45 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(60 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(75 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(90 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(105 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(120 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(135 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(150 250 250)" />
            <line x1="250" y1="28" x2="250" y2="472" stroke="url(#grillGradient)" stroke-width="3" transform="rotate(165 250 250)" />
          </g>

          <circle
            cx="250"
            cy="250"
            r="226"
            fill="none"
            stroke="rgba(255,255,255,0.75)"
            stroke-width="12"
          />

          <circle
            cx="250"
            cy="250"
            r="219"
            fill="none"
            stroke="rgba(15,121,184,0.13)"
            stroke-width="5"
          />
        </svg>

        <div class="center-logo">
          <img
            src="https://sajvwebsiteblobstorage.blob.core.windows.net/blog/tools-2375/logo.svg"
            alt="Logo"
          />
        </div>
      </div>

      <div class="stand" aria-hidden="true"></div>
      <div class="base" aria-hidden="true"></div>
    </section>

    <div class="controls">
      <label class="sr-only" for="speedControl">Ventilatorstand</label>
      <input
        id="speedControl"
        type="range"
        min="1"
        max="10"
        step="1"
        value="5"
      />
    </div>
  </main>

  <script>
    const speedControl = document.getElementById("speedControl");
    const root = document.documentElement;

    function setFanSpeed(value) {
      const speed = Number(value);

      const fanDuration = 1.7 - speed * 0.145;
      const windDuration = 1.8 - speed * 0.105;
      const windOpacity = 0.35 + speed * 0.065;

      root.style.setProperty("--fan-speed", `${fanDuration.toFixed(3)}s`);
      root.style.setProperty("--wind-speed", `${windDuration.toFixed(3)}s`);
      root.style.setProperty("--wind-opacity", windOpacity.toFixed(2));
    }

    speedControl.addEventListener("input", function () {
      setFanSpeed(this.value);
    });

    setFanSpeed(speedControl.value);
  </script>
</body>
</html>
