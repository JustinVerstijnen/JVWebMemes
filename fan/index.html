<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventilator</title>

  <style>
    :root {
      --bg-1: #eaf8ff;
      --bg-2: #c8efff;
      --blue-1: #dff7ff;
      --blue-2: #a9e6fb;
      --blue-3: #4ab8e8;
      --blue-4: #147eb8;
      --dark-blue: #12384f;
      --shadow: rgba(15, 121, 184, 0.25);
      --speed: 0s;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 36%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body.speed-0 {
      --speed: 0s;
    }

    body.speed-1 {
      --speed: 1.4s;
    }

    body.speed-2 {
      --speed: 0.7s;
    }

    body.speed-3 {
      --speed: 0.32s;
    }

    .wrapper {
      width: min(560px, 92vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .fan-scene {
      position: relative;
      width: min(500px, 86vw);
      height: min(560px, 96vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wind {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms ease;
      z-index: 0;
    }

    body.speed-1 .wind,
    body.speed-2 .wind,
    body.speed-3 .wind {
      opacity: 1;
    }

    .wind span {
      position: absolute;
      left: 58%;
      height: 9px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        rgba(57, 174, 229, 0.45),
        rgba(57, 174, 229, 0)
      );
      animation: windMove 1.5s linear infinite;
      opacity: 0;
    }

    .wind span:nth-child(1) {
      top: 30%;
      width: 140px;
      animation-delay: 0s;
    }

    .wind span:nth-child(2) {
      top: 42%;
      width: 190px;
      animation-delay: 0.25s;
    }

    .wind span:nth-child(3) {
      top: 54%;
      width: 160px;
      animation-delay: 0.5s;
    }

    .wind span:nth-child(4) {
      top: 66%;
      width: 125px;
      animation-delay: 0.75s;
    }

    body.speed-2 .wind span {
      animation-duration: 1s;
    }

    body.speed-3 .wind span {
      animation-duration: 0.7s;
    }

    @keyframes windMove {
      0% {
        transform: translateX(-20px) scaleX(0.6);
        opacity: 0;
      }

      20% {
        opacity: 0.75;
      }

      100% {
        transform: translateX(130px) scaleX(1.1);
        opacity: 0;
      }
    }

    .fan-head {
      position: absolute;
      top: 5%;
      left: 50%;
      width: 82%;
      aspect-ratio: 1 / 1;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.98) 0 25%, transparent 26%),
        radial-gradient(circle, rgba(185,236,255,0.38) 0 55%, transparent 56%),
        linear-gradient(145deg, rgba(255,255,255,0.95), rgba(127,211,245,0.45));
      border: 12px solid rgba(255, 255, 255, 0.8);
      box-shadow:
        inset 0 0 0 7px rgba(15, 121, 184, 0.12),
        inset 0 0 0 22px rgba(255, 255, 255, 0.3),
        0 30px 70px var(--shadow);
      z-index: 2;
      overflow: hidden;
    }

    .fan-head::before,
    .fan-head::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
    }

    .fan-head::before {
      inset: 8%;
      border: 2px solid rgba(15, 121, 184, 0.14);
    }

    .fan-head::after {
      inset: 20%;
      border: 3px solid rgba(15, 121, 184, 0.16);
    }

    .grill-line {
      position: absolute;
      top: -2%;
      left: 50%;
      width: 2px;
      height: 104%;
      background: linear-gradient(
        to bottom,
        transparent 4%,
        rgba(15, 121, 184, 0.14) 12%,
        rgba(15, 121, 184, 0.14) 88%,
        transparent 96%
      );
      transform-origin: center;
      z-index: 5;
    }

    .grill-line:nth-child(1) { transform: translateX(-50%) rotate(0deg); }
    .grill-line:nth-child(2) { transform: translateX(-50%) rotate(15deg); }
    .grill-line:nth-child(3) { transform: translateX(-50%) rotate(30deg); }
    .grill-line:nth-child(4) { transform: translateX(-50%) rotate(45deg); }
    .grill-line:nth-child(5) { transform: translateX(-50%) rotate(60deg); }
    .grill-line:nth-child(6) { transform: translateX(-50%) rotate(75deg); }
    .grill-line:nth-child(7) { transform: translateX(-50%) rotate(90deg); }
    .grill-line:nth-child(8) { transform: translateX(-50%) rotate(105deg); }
    .grill-line:nth-child(9) { transform: translateX(-50%) rotate(120deg); }
    .grill-line:nth-child(10) { transform: translateX(-50%) rotate(135deg); }
    .grill-line:nth-child(11) { transform: translateX(-50%) rotate(150deg); }
    .grill-line:nth-child(12) { transform: translateX(-50%) rotate(165deg); }

    .rotor {
      position: absolute;
      inset: 19%;
      border-radius: 50%;
      z-index: 2;
      animation: spin var(--speed) linear infinite;
      animation-play-state: paused;
    }

    body.speed-1 .rotor,
    body.speed-2 .rotor,
    body.speed-3 .rotor {
      animation-play-state: running;
    }

    @keyframes spin {
      from {
        rotate: 0deg;
      }

      to {
        rotate: 360deg;
      }
    }

    .blade {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 42%;
      height: 24%;
      border-radius: 100% 18% 100% 28%;
      background:
        radial-gradient(circle at 28% 45%, rgba(255,255,255,0.9), transparent 34%),
        linear-gradient(135deg, rgba(210,247,255,0.96), rgba(57,174,229,0.88));
      box-shadow:
        inset -10px -8px 18px rgba(15, 121, 184, 0.18),
        inset 8px 7px 14px rgba(255, 255, 255, 0.5);
      transform-origin: 0 50%;
    }

    .blade:nth-child(1) {
      transform: rotate(0deg) translate(18%, -50%) skewX(-10deg);
    }

    .blade:nth-child(2) {
      transform: rotate(90deg) translate(18%, -50%) skewX(-10deg);
    }

    .blade:nth-child(3) {
      transform: rotate(180deg) translate(18%, -50%) skewX(-10deg);
    }

    .blade:nth-child(4) {
      transform: rotate(270deg) translate(18%, -50%) skewX(-10deg);
    }

    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 30%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, #ffffff, #def7ff 44%, #8edaf7 100%);
      border: 8px solid rgba(255,255,255,0.92);
      box-shadow:
        inset 0 -10px 25px rgba(15, 121, 184, 0.18),
        0 14px 30px rgba(15, 121, 184, 0.26);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 6;
    }

    .hub img {
      width: 68%;
      height: 68%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .stand {
      position: absolute;
      top: 71%;
      left: 50%;
      width: 16%;
      height: 23%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, #78cef0, #e0f8ff 50%, #5fc0e7);
      box-shadow: inset 0 0 16px rgba(15, 121, 184, 0.2);
      z-index: 1;
    }

    .base {
      position: absolute;
      left: 50%;
      bottom: 3%;
      width: 48%;
      height: 10%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, #dff7ff, #72cceb);
      box-shadow:
        inset 0 -10px 25px rgba(15, 121, 184, 0.18),
        0 20px 35px rgba(15, 121, 184, 0.2);
      z-index: 1;
    }

    .controls {
      width: min(320px, 76vw);
      padding: 16px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 45px rgba(15, 121, 184, 0.16);
      border: 1px solid rgba(255,255,255,0.76);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue-4);
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 620px) {
      .wrapper {
        gap: 22px;
      }

      .fan-scene {
        height: min(510px, 98vw);
      }

      .wind span {
        max-width: 110px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rotor,
      .wind span {
        animation: none !important;
      }
    }
  </style>
</head>

<body class="speed-0">
  <main class="wrapper">
    <section class="fan-scene" aria-label="Ventilator">
      <div class="wind" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="fan-head">
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>

        <div class="rotor" aria-hidden="true">
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
        </div>

        <div class="hub">
          <img
            src="https://sajvwebsiteblobstorage.blob.core.windows.net/blog/tools-2375/logo.svg"
            alt="Logo"
          />
        </div>
      </div>

      <div class="stand" aria-hidden="true"></div>
      <div class="base" aria-hidden="true"></div>
    </section>

    <div class="controls">
      <label for="speedControl" class="sr-only">Ventilatorstand</label>
      <input
        id="speedControl"
        type="range"
        min="0"
        max="3"
        step="1"
        value="0"
      />
    </div>
  </main>

  <script>
    const speedControl = document.getElementById("speedControl");

    function setSpeed(speed) {
      document.body.classList.remove("speed-0", "speed-1", "speed-2", "speed-3");
      document.body.classList.add(`speed-${speed}`);
    }

    speedControl.addEventListener("input", function () {
      setSpeed(this.value);
    });

    setSpeed(speedControl.value);
  </script>
</body>
</html>
