<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderne ventilator</title>

  <style>
    :root {
      --bg-1: #eaf8ff;
      --bg-2: #c7edff;
      --blue-1: #b9ecff;
      --blue-2: #7fd3f5;
      --blue-3: #39aee5;
      --blue-4: #0f79b8;
      --dark: #12384f;
      --white: #ffffff;
      --shadow: rgba(16, 93, 138, 0.22);
      --speed: 0s;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--dark);
      background:
        radial-gradient(circle at top left, #ffffff 0, transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      width: min(920px, 94vw);
      display: grid;
      grid-template-columns: 1fr;
      justify-items: center;
      gap: 28px;
      text-align: center;
      position: relative;
      padding: 40px 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.07em;
      font-weight: 900;
      color: #0b6fa9;
      text-shadow: 0 12px 30px rgba(15, 121, 184, 0.18);
    }

    .subtitle {
      margin: -12px 0 0;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: rgba(18, 56, 79, 0.72);
    }

    .fan-scene {
      position: relative;
      width: min(520px, 86vw);
      height: min(520px, 86vw);
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 28px 35px var(--shadow));
    }

    .wind {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 250ms ease;
    }

    body.speed-1 .wind,
    body.speed-2 .wind,
    body.speed-3 .wind {
      opacity: 1;
    }

    .wind span {
      position: absolute;
      left: 59%;
      height: 10px;
      width: 160px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(57, 174, 229, 0.42), rgba(57, 174, 229, 0));
      transform-origin: left center;
      animation: blow 1.7s linear infinite;
      opacity: 0;
    }

    .wind span:nth-child(1) {
      top: 28%;
      animation-delay: 0s;
    }

    .wind span:nth-child(2) {
      top: 41%;
      width: 210px;
      animation-delay: 0.25s;
    }

    .wind span:nth-child(3) {
      top: 54%;
      width: 180px;
      animation-delay: 0.5s;
    }

    .wind span:nth-child(4) {
      top: 67%;
      width: 135px;
      animation-delay: 0.75s;
    }

    body.speed-2 .wind span {
      animation-duration: 1.15s;
    }

    body.speed-3 .wind span {
      animation-duration: 0.8s;
    }

    @keyframes blow {
      0% {
        transform: translateX(-10px) scaleX(0.6);
        opacity: 0;
      }

      20% {
        opacity: 0.75;
      }

      100% {
        transform: translateX(140px) scaleX(1.15);
        opacity: 0;
      }
    }

    .fan {
      position: relative;
      width: 82%;
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.96) 0 28%, transparent 29%),
        radial-gradient(circle, rgba(185, 236, 255, 0.38) 0 54%, transparent 55%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(127, 211, 245, 0.35));
      border: 12px solid rgba(255, 255, 255, 0.76);
      box-shadow:
        inset 0 0 0 7px rgba(15, 121, 184, 0.12),
        inset 0 0 0 22px rgba(255, 255, 255, 0.32),
        0 30px 70px rgba(15, 121, 184, 0.25);
    }

    .fan::before,
    .fan::after {
      content: "";
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      border: 2px solid rgba(15, 121, 184, 0.14);
      pointer-events: none;
    }

    .fan::after {
      inset: 20%;
      border-width: 3px;
      border-color: rgba(15, 121, 184, 0.16);
    }

    .grill-line {
      position: absolute;
      width: 2px;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 4%,
        rgba(15, 121, 184, 0.14) 12%,
        rgba(15, 121, 184, 0.14) 88%,
        transparent 96%
      );
      left: calc(50% - 1px);
      top: 0;
      transform-origin: center;
      pointer-events: none;
    }

    .grill-line:nth-child(1) {
      transform: rotate(0deg);
    }

    .grill-line:nth-child(2) {
      transform: rotate(15deg);
    }

    .grill-line:nth-child(3) {
      transform: rotate(30deg);
    }

    .grill-line:nth-child(4) {
      transform: rotate(45deg);
    }

    .grill-line:nth-child(5) {
      transform: rotate(60deg);
    }

    .grill-line:nth-child(6) {
      transform: rotate(75deg);
    }

    .grill-line:nth-child(7) {
      transform: rotate(90deg);
    }

    .grill-line:nth-child(8) {
      transform: rotate(105deg);
    }

    .grill-line:nth-child(9) {
      transform: rotate(120deg);
    }

    .grill-line:nth-child(10) {
      transform: rotate(135deg);
    }

    .grill-line:nth-child(11) {
      transform: rotate(150deg);
    }

    .grill-line:nth-child(12) {
      transform: rotate(165deg);
    }

    .rotor {
      position: absolute;
      width: 63%;
      aspect-ratio: 1;
      border-radius: 50%;
      animation: spin var(--speed) linear infinite;
      animation-play-state: paused;
    }

    body.speed-1 .rotor,
    body.speed-2 .rotor,
    body.speed-3 .rotor {
      animation-play-state: running;
    }

    body.speed-1 {
      --speed: 1.4s;
    }

    body.speed-2 {
      --speed: 0.72s;
    }

    body.speed-3 {
      --speed: 0.34s;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .blade {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38%;
      height: 23%;
      border-radius: 100% 20% 100% 28%;
      background:
        radial-gradient(circle at 28% 45%, rgba(255, 255, 255, 0.9), transparent 35%),
        linear-gradient(135deg, rgba(185, 236, 255, 0.94), rgba(57, 174, 229, 0.86));
      box-shadow:
        inset -10px -8px 18px rgba(15, 121, 184, 0.18),
        inset 8px 7px 14px rgba(255, 255, 255, 0.46);
      transform-origin: 0 50%;
    }

    .blade:nth-child(1) {
      transform: rotate(0deg) translate(18%, -50%) skewX(-10deg);
    }

    .blade:nth-child(2) {
      transform: rotate(90deg) translate(18%, -50%) skewX(-10deg);
    }

    .blade:nth-child(3) {
      transform: rotate(180deg) translate(18%, -50%) skewX(-10deg);
    }

    .blade:nth-child(4) {
      transform: rotate(270deg) translate(18%, -50%) skewX(-10deg);
    }

    .hub {
      position: absolute;
      width: 29%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, #ffffff, #d9f5ff 44%, #8ddaf7 100%);
      border: 8px solid rgba(255, 255, 255, 0.88);
      box-shadow:
        inset 0 -10px 25px rgba(15, 121, 184, 0.18),
        0 14px 30px rgba(15, 121, 184, 0.26);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .hub img {
      width: 68%;
      height: 68%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .stand {
      position: absolute;
      width: 18%;
      height: 28%;
      background: linear-gradient(90deg, #78cef0, #d9f5ff 50%, #5fc0e7);
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      z-index: -1;
      box-shadow: inset 0 0 16px rgba(15, 121, 184, 0.2);
    }

    .base {
      position: absolute;
      width: 48%;
      height: 12%;
      left: 50%;
      bottom: -4%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, #d9f5ff, #72cceb);
      box-shadow:
        inset 0 -10px 25px rgba(15, 121, 184, 0.18),
        0 20px 35px rgba(15, 121, 184, 0.2);
      z-index: -2;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 45px rgba(15, 121, 184, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.76);
    }

    .controls button {
      width: 54px;
      height: 54px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      color: var(--blue-4);
      font-size: 1.12rem;
      font-weight: 900;
      background: rgba(255, 255, 255, 0.82);
      box-shadow:
        inset 0 -4px 10px rgba(15, 121, 184, 0.08),
        0 8px 18px rgba(15, 121, 184, 0.14);
      transition:
        transform 160ms ease,
        background 160ms ease,
        color 160ms ease,
        box-shadow 160ms ease;
    }

    .controls button:hover {
      transform: translateY(-2px);
    }

    .controls button.active {
      color: white;
      background: linear-gradient(145deg, var(--blue-3), var(--blue-4));
      box-shadow:
        inset 0 -4px 10px rgba(0, 0, 0, 0.1),
        0 10px 24px rgba(15, 121, 184, 0.26);
    }

    .status {
      min-height: 24px;
      font-weight: 750;
      color: rgba(18, 56, 79, 0.68);
    }

    .footer {
      font-size: 0.9rem;
      color: rgba(18, 56, 79, 0.55);
    }

    @media (max-width: 620px) {
      .page {
        gap: 18px;
      }

      .fan-scene {
        width: min(430px, 92vw);
        height: min(430px, 92vw);
      }

      .controls button {
        width: 48px;
        height: 48px;
      }

      .wind span {
        width: 100px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rotor,
      .wind span {
        animation: none !important;
      }
    }
  </style>
</head>

<body class="speed-0">
  <main class="page">
    <div>
      <h1 class="title">Het is warm</h1>
      <p class="subtitle">Klik op een stand voor wat digitale verkoeling.</p>
    </div>

    <section class="fan-scene" aria-label="Animatie van een moderne ventilator">
      <div class="wind" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="fan">
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>
        <span class="grill-line"></span>

        <div class="rotor" id="rotor" aria-hidden="true">
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
        </div>

        <div class="hub">
          <img
            src="https://sajvwebsiteblobstorage.blob.core.windows.net/blog/tools-2375/logo.svg"
            alt="Logo"
          />
        </div>
      </div>

      <div class="stand" aria-hidden="true"></div>
      <div class="base" aria-hidden="true"></div>
    </section>

    <nav class="controls" aria-label="Ventilator snelheid">
      <button type="button" data-speed="0" class="active" aria-pressed="true">0</button>
      <button type="button" data-speed="1" aria-pressed="false">1</button>
      <button type="button" data-speed="2" aria-pressed="false">2</button>
      <button type="button" data-speed="3" aria-pressed="false">3</button>
    </nav>

    <div class="status" id="status">Ventilator staat uit</div>

    <footer class="footer">
      Moderne HTML/CSS/JS ventilator
    </footer>
  </main>

  <script>
    const buttons = document.querySelectorAll(".controls button");
    const statusText = document.getElementById("status");

    const labels = {
      0: "Ventilator staat uit",
      1: "Stand 1 — rustig briesje",
      2: "Stand 2 — lekker koel",
      3: "Stand 3 — volle kracht"
    };

    function setSpeed(speed) {
      document.body.classList.remove("speed-0", "speed-1", "speed-2", "speed-3");
      document.body.classList.add(`speed-${speed}`);

      buttons.forEach((button) => {
        const isActive = button.dataset.speed === String(speed);
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      statusText.textContent = labels[speed];
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        setSpeed(button.dataset.speed);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (["0", "1", "2", "3"].includes(event.key)) {
        setSpeed(event.key);
      }
    });
  </script>
</body>
</html>
