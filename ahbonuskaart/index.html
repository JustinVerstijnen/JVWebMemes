<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mijn Klantenkaart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f3f3f3;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:100%;
    max-width:430px;
    background:#fff;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    display:block;
}

.bottom{
    padding:20px;
    text-align:center;
}

.bottom h2{
    font-size:26px;
    margin-bottom:10px;
}

.bottom p{
    color:#666;
}
</style>

</head>

<body>

<div class="card">

<img src="bonuskaart.webp" alt="Mijn klantenkaart">

<div class="bottom">
<h2>Mijn Klantenkaart</h2>
<p>Laat de barcode scannen bij de kassa.</p>
</div>

</div>

</body>
</html>
